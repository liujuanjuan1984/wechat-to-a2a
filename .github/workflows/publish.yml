name: Release Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to publish or repair
        required: true
        type: string
      publish_to_pypi:
        description: Publish artifacts to PyPI
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build and Publish Release Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Run default regression baseline
        run: bash ./scripts/doctor.sh

      - name: Publish to PyPI
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_to_pypi }}
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Sync GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --json url >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/*.tar.gz dist/*.whl --clobber
          else
            gh release create "$RELEASE_TAG" dist/*.tar.gz dist/*.whl --verify-tag --generate-notes
          fi
