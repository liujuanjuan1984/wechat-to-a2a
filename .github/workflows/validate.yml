name: Validate PRs and Main

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-gate:
    name: Validate Default Toolchain
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Sync locked dependencies
        run: uv sync --all-extras --frozen

      - name: Run lint checks
        run: bash ./scripts/lint.sh

      - name: Run test suite
        run: uv run pytest

      - name: Enforce coverage policy
        run: uv run python ./scripts/check_coverage.py

      - name: Export runtime requirements for vulnerability audit
        run: >
          uv export --format requirements.txt --no-dev --locked --no-emit-project
          --output-file /tmp/runtime-requirements.txt >/dev/null

      - name: Run runtime dependency vulnerability audit
        run: uv run pip-audit --requirement /tmp/runtime-requirements.txt

      - name: Build package artifacts
        run: uv build --no-sources

      - name: Smoke test built wheel
        run: bash ./scripts/smoke_test_built_cli.sh dist/wechat_to_a2a-*.whl

  runtime-matrix:
    name: Validate Runtime Matrix (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Sync locked dependencies
        run: uv sync --all-extras --frozen

      - name: Run runtime regression tests
        run: uv run pytest --no-cov
